kind = "web"
previewPath = "/"
title = "SkillGraph AI"
version = "1.0.0"
id = "artifacts/skill-graph"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19797

[services.development]
run = "pnpm --filter @workspace/skill-graph run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skill-graph", "run", "build" ]
publicDir = "artifacts/skill-graph/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19797"
BASE_PATH = "/"
